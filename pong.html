<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #000; }
        canvas { border: 2px solid #fff; }
    </style>
</head>
<body>
    <canvas id="pong" width="800" height="400"></canvas>
    <script>
        const canvas = document.getElementById('pong');
        const ctx = canvas.getContext('2d');

        // Create the pong paddle and ball
        const paddleWidth = 10, paddleHeight = 100;
        const ballSize = 10;
        let player = { x: 0, y: canvas.height / 2 - paddleHeight / 2, width: paddleWidth, height: paddleHeight, score: 0 };
        let computer = { x: canvas.width - paddleWidth, y: canvas.height / 2 - paddleHeight / 2, width: paddleWidth, height: paddleHeight, score: 0 };
        let ball = { x: canvas.width / 2, y: canvas.height / 2, size: ballSize, speed: { x: 5, y: 5 } };

        // Control the player paddle
        document.addEventListener('mousemove', (event) => {
            const rect = canvas.getBoundingClientRect();
            player.y = event.clientY - rect.top - player.height / 2;
        });

        document.addEventListener('keydown', (event) => {
            switch (event.key) {
                case 'ArrowUp':
                    player.y = Math.max(player.y - 20, 0);
                    break;
                case 'ArrowDown':
                    player.y = Math.min(player.y + 20, canvas.height - player.height);
                    break;
            }
        });

        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.speed.x = -ball.speed.x;
        }

        function update() {
            ball.x += ball.speed.x;
            ball.y += ball.speed.y;

            // Ball collision with top and bottom
            if (ball.y + ball.size > canvas.height || ball.y < 0) {
                ball.speed.y = -ball.speed.y;
            }

            // Ball collision with paddles
            if (ball.x < player.x + player.width && ball.y > player.y && ball.y < player.y + player.height) {
                ball.speed.x = -ball.speed.x;
            }

            // Computer AI
            computer.y += (ball.y - (computer.y + computer.height / 2)) * 0.1;

            if (ball.x + ball.size > computer.x && ball.y > computer.y && ball.y < computer.y + computer.height) {
                ball.speed.x = -ball.speed.x;
            }

            // Score update
            if (ball.x < 0) {
                computer.score++;
                resetBall();
            } else if (ball.x + ball.size > canvas.width) {
                player.score++;
                resetBall();
            }
        }

        function draw() {
            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw paddles
            ctx.fillStyle = '#fff';
            ctx.fillRect(player.x, player.y, player.width, player.height);
            ctx.fillRect(computer.x, computer.y, computer.width, computer.height);

            // Draw ball
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.size, 0, Math.PI * 2);
            ctx.fill();

            // Draw scores
            ctx.font = '20px Arial';
            ctx.fillText(player.score, canvas.width / 4, 30);
            ctx.fillText(computer.score, 3 * canvas.width / 4, 30);
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
